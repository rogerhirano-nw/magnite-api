name: Temp probe GAM v1 SDK
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: |
          python - <<'PYEOF'
          from importlib.metadata import version
          print("=== google-ads-admanager version ===")
          print(version("google-ads-admanager"))
          print()

          from google.ads import admanager_v1
          all_attrs = sorted(a for a in dir(admanager_v1) if not a.startswith("_"))
          clients = [a for a in all_attrs if a.endswith("Client")]
          print("=== Available *Client classes ===")
          for c in clients:
              print(" -", c)
          print()
          print("=== Creative-related attrs (any case) ===")
          for a in all_attrs:
              if "creative" in a.lower() or "lica" in a.lower() or "association" in a.lower():
                  print(" -", a)
          print()
          print("=== List*Request messages ===")
          for a in all_attrs:
              if a.startswith("List") and a.endswith("Request"):
                  print(" -", a)
          PYEOF

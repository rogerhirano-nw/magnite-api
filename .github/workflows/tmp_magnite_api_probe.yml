name: Temp Magnite Marketplace API probe
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - env:
          MAGNITE_KEY:           ${{ secrets.MAGNITE_KEY }}
          MAGNITE_SECRET:        ${{ secrets.MAGNITE_SECRET }}
          MAGNITE_PUBLISHER_ID:  ${{ secrets.MAGNITE_PUBLISHER_ID }}
        run: |
          python - <<'PYEOF'
          # Read-only probe: which Magnite Marketplace API endpoint(s) return
          # deal metadata for a known deal_id? No mutation. Pure GET requests.
          import os, json
          import requests
          from requests.auth import HTTPBasicAuth

          KEY  = os.environ["MAGNITE_KEY"]
          SEC  = os.environ["MAGNITE_SECRET"]
          PUB  = os.environ["MAGNITE_PUBLISHER_ID"]
          DEAL = "730440"  # conformant Newsweek_PA_... deal — read-only probe target

          # Try several plausible host + path combinations. Magnite's
          # Marketplace API isn't well-documented externally and the path
          # structure has evolved (Rubicon → Magnite).
          targets = [
              "https://api.rubiconproject.com/v1/deals/{deal}",
              "https://api.rubiconproject.com/v1/deal/{deal}",
              "https://api.rubiconproject.com/api/v1/deals/{deal}",
              "https://api.rubiconproject.com/marketplace/v1/deals/{deal}",
              "https://api.rubiconproject.com/console/v1/deals/{deal}",
              "https://api.rubiconproject.com/v1/publishers/{pub}/deals/{deal}",
              "https://api.rubiconproject.com/v1/accounts/{pub}/deals/{deal}",
              "https://console.magnite.com/api/v1/deals/{deal}",
              "https://console.magnite.com/v1/deals/{deal}",
          ]

          auth = HTTPBasicAuth(KEY, SEC)
          headers = {"Accept": "application/json"}

          print(f"Probing for deal_id={DEAL} (publisher_id={PUB})\n")
          best = None
          for tmpl in targets:
              url = tmpl.format(deal=DEAL, pub=PUB)
              try:
                  r = requests.get(url, auth=auth, headers=headers, timeout=15)
                  print(f"  [{r.status_code:>3}] {url}")
                  if r.status_code == 200:
                      try:
                          body = r.json()
                          print(f"        OK — keys: {list(body.keys())[:20] if isinstance(body, dict) else type(body).__name__}")
                          if best is None:
                              best = (url, body)
                      except Exception:
                          print(f"        OK but non-JSON: {r.text[:200]}")
                  elif r.status_code in (401, 403):
                      print(f"        AUTH: {r.text[:200]}")
                  elif r.status_code == 404:
                      pass  # silent — most will 404
                  else:
                      print(f"        body: {r.text[:200]}")
              except Exception as e:
                  print(f"  ERR  {url}: {type(e).__name__}: {e}")

          if best:
              print("\n=== Best match — full response shape ===")
              print(json.dumps(best[1], indent=2)[:3000])
          else:
              print("\nNo endpoint returned 200. The Magnite Marketplace API may require")
              print("a different domain (e.g. console.magnite.com behind login), a token-based")
              print("auth (not HTTP Basic), or be unavailable to this credential set.")
          PYEOF

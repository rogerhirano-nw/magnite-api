name: Query unique DSP values
on: [workflow_dispatch]
jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install sqlalchemy psycopg2-binary
      - name: Print unique DSP values from all SSP tables
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PYEOF'
          import os, sqlalchemy
          engine = sqlalchemy.create_engine(os.environ["DATABASE_URL"])

          # First inspect actual columns in each table
          for table in ["gam_pmp_deals", "magnite_deal_daily", "pubmatic_deals"]:
              with engine.connect() as conn:
                  try:
                      cols = conn.execute(sqlalchemy.text(
                          f"SELECT column_name FROM information_schema.columns WHERE table_name='{table}' ORDER BY ordinal_position"
                      )).fetchall()
                      print(f"\n=== {table} columns: {[c[0] for c in cols]} ===")
                  except Exception as e:
                      print(f"inspect {table}: {e}")

          # Query DSP values with separate connections so one failure doesn't abort others
          for table, col in [("gam_pmp_deals", "dsp"), ("pubmatic_deals", "dsp")]:
              with engine.connect() as conn:
                  try:
                      rows = conn.execute(sqlalchemy.text(
                          f"SELECT DISTINCT \"{col}\" FROM \"{table}\" WHERE \"{col}\" IS NOT NULL AND TRIM(CAST(\"{col}\" AS TEXT)) != '' ORDER BY \"{col}\""
                      )).fetchall()
                      print(f"\n=== {table}.{col} ({len(rows)} unique) ===")
                      for r in rows:
                          print(f"  {r[0]!r}")
                  except Exception as e:
                      print(f"\n=== {table}.{col} ERROR: {e}")

          # Magnite DSP comes from deal name — extract position 1 (deal type) and 4 (dsp)
          with engine.connect() as conn:
              try:
                  rows = conn.execute(sqlalchemy.text(
                      "SELECT DISTINCT SPLIT_PART(deal, '_', 5) FROM magnite_deal_daily WHERE deal IS NOT NULL ORDER BY 1"
                  )).fetchall()
                  print(f"\n=== magnite_deal_daily DSP (from deal name pos 4, {len(rows)} unique) ===")
                  for r in rows:
                      if r[0]:
                          print(f"  {r[0]!r}")
              except Exception as e:
                  print(f"\n=== magnite DSP extraction ERROR: {e}")
          PYEOF

name: Temp probe GAM Metric enum
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: |
          python - <<'PYEOF'
          # List all GAM v1 ReportDefinition.Metric enum members so we can
          # identify the actual video metric names. Filter for VIDEO / VCR /
          # COMPLET / STARTS-style substrings.
          from google.ads import admanager_v1
          M = admanager_v1.ReportDefinition.Metric
          all_names = [m.name for m in M if m.name != "METRIC_UNSPECIFIED"]
          print(f"total metrics: {len(all_names)}\n")
          # Show video-related candidates first.
          interesting = sorted(n for n in all_names
                               if "VIDEO" in n or "COMPLET" in n or "START" in n or "QUARTILE" in n or "MIDPOINT" in n)
          print(f"=== Video-related metrics ({len(interesting)}) ===")
          for n in interesting:
              print(f"  {n}")
          PYEOF

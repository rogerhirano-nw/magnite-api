name: Temp find PA line item delivery
on:
  workflow_dispatch:
jobs:
  find:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - env:
          GAM_NETWORK_ID:           ${{ secrets.GAM_NETWORK_ID }}
          GAM_SERVICE_ACCOUNT_JSON: ${{ secrets.GAM_SERVICE_ACCOUNT_JSON }}
        run: |
          python - <<'PYEOF'
          # Find a specific PA line item, dump its metadata + targeting (Track B
          # signal: which external_deal_id does it reference?), and produce a
          # CSV of its delivery for the last 7 days.
          import csv, json, re, sys
          from datetime import date, timedelta
          from gam_client import GAMClient, admanager_v1

          TARGET_NAME = "Newsweek_PA_Automotive_Adx_DV360_WPP_Mindshare_Ford Motor Company_Ford-Always-On_US_Display_$3_Team-USA_THern"
          print(f"Target: {TARGET_NAME}\n")

          gam = GAMClient()

          # --- 1. Locate the line item by display_name (try direct filter first,
          #       fall back to full scan if the filter doesn't match anything).
          print("=" * 70)
          print("1. Locate line item")
          print("=" * 70)
          matches = []
          try:
              for li in gam._li_client.list_line_items(
                  admanager_v1.ListLineItemsRequest(
                      parent=gam._parent,
                      filter=f'displayName="{TARGET_NAME}"',
                  )
              ):
                  matches.append(li)
              print(f"  exact-filter: {len(matches)} match(es)")
          except Exception as e:
              print(f"  exact-filter failed: {type(e).__name__}: {e}")

          if not matches:
              print("  scanning all line items for substring match...")
              count = 0
              key = TARGET_NAME.split("_$")[0]  # match up to '$3' price token to dodge $-escaping issues
              for li in gam._li_client.list_line_items(
                  admanager_v1.ListLineItemsRequest(parent=gam._parent)
              ):
                  count += 1
                  name = li.display_name or ""
                  if name == TARGET_NAME or (key and key in name):
                      matches.append(li)
              print(f"  scanned {count} line items; {len(matches)} match(es)")

          if not matches:
              print("\nNO MATCH FOUND. Exiting cleanly.")
              sys.exit(0)

          li = matches[0]
          li_id_m = re.search(r"/lineItems/(\d+)$", li.name)
          li_id = li_id_m.group(1) if li_id_m else li.name

          # --- 2. Metadata dump
          print()
          print("=" * 70)
          print(f"2. Line item metadata (id={li_id})")
          print("=" * 70)
          for f in ("name", "display_name", "order", "line_item_type",
                    "start_time", "end_time", "rate", "goal", "primary_goal",
                    "status", "priority"):
              try:
                  v = getattr(li, f, None)
                  print(f"  {f}: {v}")
              except Exception as e:
                  print(f"  {f}: (read error: {e})")

          # --- 3. Targeting — Track B signal: does this LI reference a PA external_deal_id?
          print()
          print("=" * 70)
          print("3. Targeting proto (Track B: PA external_deal_id reference?)")
          print("=" * 70)
          try:
              from google.protobuf import json_format
              tgt_dict = json_format.MessageToDict(li.__class__.pb(li).targeting)
              print(json.dumps(tgt_dict, indent=2))
          except Exception as e:
              print(f"  MessageToDict failed: {e}")
              tgt = getattr(li, "targeting", None)
              if tgt:
                  for fld in dir(tgt):
                      if fld.startswith("_") or callable(getattr(tgt, fld, None)):
                          continue
                      val = getattr(tgt, fld, None)
                      if val:
                          print(f"  {fld}: {val!r}")

          # --- 4. Delivery report for the last 7 days, filtered to this LI.
          print()
          print("=" * 70)
          print(f"4. Delivery (last 7 days) for line_item_id={li_id}")
          print("=" * 70)
          yesterday = date.today() - timedelta(days=1)
          start = yesterday - timedelta(days=6)
          df = gam.run_delivery_report(start, yesterday)
          df["line_item_id"] = df["line_item_id"].astype(str)
          deliv = df[df["line_item_id"] == li_id].copy()
          print(f"  rows: {len(deliv)} (of {len(df)} total in delivery report)")
          if deliv.empty:
              # Save an empty CSV with just headers so the artifact step always has something.
              cols = ["date", "line_item_id", "line_item_name", "order_id", "order_name",
                      "ad_server_impressions", "ad_server_cpm_and_cpc_revenue", "ad_server_average_ecpm"]
              import pandas as pd
              pd.DataFrame(columns=cols).to_csv("pa_line_item_delivery.csv", index=False)
              print("  (no delivery rows; wrote empty CSV)")
          else:
              # Drop columns that are mostly None to keep the CSV readable
              deliv = deliv.dropna(axis=1, how="all")
              deliv.to_csv("pa_line_item_delivery.csv", index=False)
              print(deliv.to_string())
              print(f"\n  CSV written to pa_line_item_delivery.csv ({len(deliv)} rows)")
          PYEOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pa-line-item-delivery
          path: pa_line_item_delivery.csv
          if-no-files-found: ignore

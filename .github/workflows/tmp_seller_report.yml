name: Temp seller report
on:
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install sqlalchemy psycopg2-binary
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PYEOF'
          import os, re, sqlalchemy
          from sqlalchemy import text, inspect
          engine = sqlalchemy.create_engine(os.environ["DATABASE_URL"])
          insp = inspect(engine)
          with engine.connect() as conn:
              # All columns in gam_campaigns
              cols = [c['name'] for c in insp.get_columns('gam_campaigns')]
              print("gam_campaigns columns:", cols)

              # Total row count
              cnt = conn.execute(text("SELECT COUNT(*) FROM gam_campaigns")).scalar()
              print("Total rows:", cnt)

              # Sample distinct order_name prefixes (first 20 chars)
              r = conn.execute(text("""
                  SELECT DISTINCT LEFT(order_name, 30) as pfx, COUNT(*) as n
                  FROM gam_campaigns
                  GROUP BY pfx ORDER BY n DESC LIMIT 30
              """))
              print("\nTop order_name prefixes (first 30 chars):")
              for row in r:
                  print(f"  {row[0]!r}: {row[1]}")

              # Now the real report — filter by whatever prefix is used
              r2 = conn.execute(text("""
                  SELECT DISTINCT order_name, salesperson, COUNT(*) as line_items
                  FROM gam_campaigns
                  GROUP BY order_name, salesperson
                  ORDER BY order_name
                  LIMIT 50
              """))
              rows2 = [dict(row._mapping) for row in r2]

              def parse(val):
                  if not isinstance(val, str) or not val.strip():
                      return ''
                  m = re.search(r"-\s*([^-(]+?)\s*(?:\(|$)", val)
                  return m.group(1).strip() if m else val.strip()

              print("\norder_name,salesperson_raw,parsed_name,line_items")
              for row in rows2:
                  sp = row['salesperson'] or ''
                  parsed = parse(sp)
                  print(f'"{row["order_name"]}","{sp}","{parsed}",{row["line_items"]}')
          PYEOF

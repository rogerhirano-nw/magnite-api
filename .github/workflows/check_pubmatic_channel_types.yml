name: Check Pubmatic channel types

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Query all ID columns
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PYEOF'
          import os, sqlalchemy
          from sqlalchemy import text
          engine = sqlalchemy.create_engine(os.environ["DATABASE_URL"])
          with engine.connect() as conn:
              # All columns in the table
              r = conn.execute(text("SELECT column_name FROM information_schema.columns WHERE table_name = 'pubmatic_deals' ORDER BY ordinal_position"))
              print("Columns:", [row[0] for row in r])

              # Distinct deal_source_id and deal_source
              r2 = conn.execute(text("""
                  SELECT deal_source_id, deal_source, COUNT(*) as cnt
                  FROM pubmatic_deals
                  GROUP BY deal_source_id, deal_source
                  ORDER BY cnt DESC
              """))
              print("\ndeal_source_id / deal_source values:")
              for row in r2:
                  print(dict(row._mapping))

              # Distinct ad_format_id and ad_format
              r3 = conn.execute(text("""
                  SELECT ad_format_id, ad_format, COUNT(*) as cnt
                  FROM pubmatic_deals
                  GROUP BY ad_format_id, ad_format
                  ORDER BY cnt DESC
              """))
              print("\nad_format_id / ad_format values:")
              for row in r3:
                  print(dict(row._mapping))

              # Distinct deal_type_id and deal_type
              r4 = conn.execute(text("""
                  SELECT deal_type_id, deal_type, COUNT(*) as cnt
                  FROM pubmatic_deals
                  GROUP BY deal_type_id, deal_type
                  ORDER BY cnt DESC
              """))
              print("\ndeal_type_id / deal_type values:")
              for row in r4:
                  print(dict(row._mapping))
          PYEOF

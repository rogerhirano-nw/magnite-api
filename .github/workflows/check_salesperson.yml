name: Check salesperson values
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install sqlalchemy psycopg2-binary
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PYEOF'
          import os, re, sqlalchemy
          from sqlalchemy import text
          engine = sqlalchemy.create_engine(os.environ["DATABASE_URL"])
          with engine.connect() as conn:
              r = conn.execute(text("""
                  SELECT salesperson, COUNT(*) as cnt
                  FROM gam_campaigns
                  GROUP BY salesperson
                  ORDER BY cnt DESC
                  LIMIT 15
              """))
              print("salesperson values:")
              for row in r:
                  val = dict(row._mapping)
                  sp = val['salesperson']
                  if sp:
                      m = re.search(r"-\s*([^-(]+?)\s*(?:\(|$)", sp)
                      val['parsed'] = m.group(1).strip() if m else sp
                  print(val)
          PYEOF
